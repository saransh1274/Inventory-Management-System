<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory System</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* 🌄 Background */
body {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🌫 Overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

/* 📦 Main Container */
.container {
    position: relative;
    width: 400px;
    padding: 25px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    color: white;
    text-align: center;
}

/* 🏷 Title */
h2 {
    margin-bottom: 15px;
}

/* Inputs & Select */
select, input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* Buttons */
button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(45deg, #3498db, #6dd5fa);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg, #2980b9, #4facfe);
}

/* Dynamic Area */
#formArea {
    margin-top: 15px;
    animation: fadeIn 0.4s ease;
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
    <h2>📦 Inventory System</h2>

    <select id="action" onchange="loadForm()">
        <option value="">Select Operation</option>
        <option value="add">Add Product</option>
        <option value="search">Search Product</option>
        <option value="delete">Delete Product</option>
        <option value="updateStock">Update Stock</option>
        <option value="total">Total Value</option>
        <option value="updateDetails">Update Details</option>
    </select>

    <div id="formArea"></div>
</div>

<script>
function loadForm() {
    let action = document.getElementById("action").value;
    let form = document.getElementById("formArea");

    if (action === "add") {
        form.innerHTML = `
            <input placeholder="ID">
            <input placeholder="Name">
            <input placeholder="Quantity">
            <input placeholder="Price">
            <button>Add Product</button>
        `;
    }

    else if (action === "search") {
        form.innerHTML = `
            <input placeholder="Enter ID">
            <button>Search</button>
        `;
    }

    else if (action === "delete") {
        form.innerHTML = `
            <input placeholder="Enter ID">
            <button>Delete</button>
        `;
    }

    else if (action === "updateStock") {
        form.innerHTML = `
            <input placeholder="ID">
            <input placeholder="Quantity (+/-)">
            <button>Update Stock</button>
        `;
    }

    else if (action === "total") {
        form.innerHTML = `
            <button>Calculate Total Inventory Value</button>
        `;
    }

    else if (action === "updateDetails") {
        form.innerHTML = `
            <input placeholder="ID">
            <input placeholder="New Name">
            <input placeholder="New Price">
            <button>Update Details</button>
        `;
    }

    else {
        form.innerHTML = "";
    }
}
</script>

</body>
</html>
